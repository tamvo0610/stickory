name: stickory
description: Turn your life into stickers
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Core UI & Navigation
  cupertino_icons: ^1.0.6
  go_router: ^14.2.0
  flex_color_scheme: ^7.3.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Images & Assets (Critical for sticker app)
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10
  cached_network_image_platform_interface: ^4.0.0

  # Animations
  animate_do: ^3.3.4

  # Responsive Design
  flutter_screenutil: ^5.9.0
  responsive_framework: ^1.5.1

  # Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP
  dio: ^5.4.3
  retrofit: ^4.1.0

  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Utils
  device_info_plus: ^10.1.0
  package_info_plus: ^6.0.0
  url_launcher: ^6.3.0

  # Security
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.0
  logger: ^2.2.0